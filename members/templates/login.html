<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SmartSched</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: url('/static/images/login_background.jpg') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-container {
            
            padding: 40px;
            width: 350px;
            border-radius: 10px;
            text-align: center;
            color: white;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 24px;
            color: white;
        }

        .input-container {
            position: relative;
            margin: 20px 0;
        }

        .input-container input {
            width: 100%;
            padding: 10px;
            border: none;
            border-bottom: 2px solid white;
            background: transparent;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .input-container label {
            position: absolute;
            left: 10px;
            top: 10px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            transition: 0.3s;
        }

        .input-container input:focus ~ label,
        .input-container input:valid ~ label {
            top: -10px;
            font-size: 12px;
            color: #75bad8;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: black;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #222;
        }

        a {
            display: block;
            margin-top: 15px;
            color: #75bad8;
            text-decoration: none;
            font-size: 14px;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>LOGIN</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="input-container">
                <input type="text" name="username" required>
                <label>Username</label>
            </div>
            <div class="input-container">
                <input type="password" name="password" required>
                <label>Password</label>
            </div>
            <button type="submit" class="login-btn">LOGIN</button>
        </form>
        <a href="{% url 'register' %}">Don't have an account? Register</a>
    </div>
</body>
</html>
