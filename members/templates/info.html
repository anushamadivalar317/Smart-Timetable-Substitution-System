<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchedSmart</title>
    <style>
        /* General Styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
        }

        /* Header */
        header {
            background: #0d1b2a;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .menu-toggle {
            font-size: 24px;
            cursor: pointer;
        }

        nav {
            display: none;
            position: absolute;
            right: 20px;
            top: 60px;
            background: #0d1b2a;
            border-radius: 5px;
        }

        nav ul {
            list-style: none;
            padding: 0;
        }

        nav ul li {
            padding: 10px;
            text-align: center;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            display: block;
        }

        /* Hero Section */
        .hero {
            background: url('/static/images/form_background.jpg') no-repeat center center/cover;
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .hero h1 {
            font-size: 36px;
        }

        .hero button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #1e90ff;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
        }

        .hero button:hover {
            background: #1565c0;
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <header>
        <div class="logo">SchedSmart</div>
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>
        <nav id="menu">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h2>Welcome, <span style="color: white;">{{ request.user.get_full_name|default:request.user.username }}</span></h2>
        <p>Please proceed to access your personalized dashboard</p>
        <button onclick="redirectToProfile()">Click Here</button>
    </section>

    <script>
        function toggleMenu() {
            let menu = document.getElementById("menu");
            menu.classList.toggle("visible");
        }

        function redirectToProfile() {
            window.location.href =' /form/'; // Change this to the correct page
        }
    </script>

</body>
</html>
