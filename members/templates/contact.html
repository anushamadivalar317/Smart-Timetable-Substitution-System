<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        /* General Styles */
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f9;
            margin: 0;
            padding: 0;
        }
        header {
            background: #007bff;
            color: #fff;
            text-align: center;
            padding: 15px;
            font-size: 24px;
        }

        /* Contact Section */
        .contact-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            max-width: 1000px;
            margin: 30px auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        /* Contact Info */
        .contact-info {
            flex: 1;
            padding: 20px;
            text-align: center;
        }
        .contact-info h2 {
            color: #333;
            margin-bottom: 15px;
        }
        .contact-item {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin: 12px 0;
        }
        .contact-item span {
            font-size: 22px;
            margin-right: 10px;
            color: #007bff;
        }

        /* Contact Form */
        .contact-form {
            flex: 1;
            padding: 20px;
        }
        .contact-form h2 {
            color: #333;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 16px;
            margin-bottom: 5px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: none;
            border-bottom: 2px solid #007bff;
            background: transparent;
            font-size: 16px;
            outline: none;
        }
        textarea {
            height: 100px;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: #fff;
            font-size: 18px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        .submit-btn:hover {
            background: #0056b3;
        }

        /* Footer */
        .footer {
            background: #333;
            color: #fff;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }

        /* Footer Links */
        .footer a {
            color: white !important;
            text-decoration: none;
            font-weight: bold;
            margin: 0 10px;
        }

        /* Add underline on hover */
        .footer a:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>


    <!-- Header -->
    <header>
        Contact Us
    </header>

    <!-- Contact Section -->
    <div class="contact-container">

        <!-- Contact Info -->
        <div class="contact-info">
            <h2>Get in Touch</h2>
            <div class="contact-item">
                <span>📞</span> Phone: +91 98765 43210
            </div>
            <div class="contact-item">
                <span>📧</span> Email: support@schedsmart.com
            </div>
            <div class="contact-item">
                <span>📍</span> Address: 123, Tech Street, Bengaluru, India
            </div>
        </div>

        <!-- Contact Form -->
        <div class="contact-form">
            <h2>Send a Message</h2>
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <select id="subject" name="subject">
                        <option value="Inquiry">Inquiry</option>
                        <option value="Technical Support">Technical Support</option>
                        <option value="Feedback">Feedback</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Submit</button>
            </form>
        </div>

    </div>



    <!-- Footer -->
    <div class="footer">
        <p>
            <a href="{% url 'home' %}" class="footer-link">Home</a>
            <a href="#" class="footer-link">Features</a>
        </p>
        <p>&copy; 2025 SchedSmart. All rights reserved.</p>
    </div>
</body>
</html>
